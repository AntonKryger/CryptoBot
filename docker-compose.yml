services:
  rl1:
    build:
      context: ./RuleBot/Live/RL1
    container_name: cryptobot-rl1
    restart: always
    volumes:
      - ./RuleBot/Live/RL1/config.yaml:/app/config.yaml:ro
      - ./RuleBot/Live/RL1/data:/app/data
      - ./RuleBot/Live/RL1/logs:/app/logs

  rd1:
    build:
      context: ./RuleBot/Demo/RD1
    container_name: cryptobot-rd1
    restart: always
    volumes:
      - ./RuleBot/Demo/RD1/config.yaml:/app/config.yaml:ro
      - ./RuleBot/Demo/RD1/data:/app/data
      - ./RuleBot/Demo/RD1/logs:/app/logs

  ad1:
    build:
      context: ./AIBot/Demo/AD1
    container_name: cryptobot-ad1
    restart: always
    volumes:
      - ./AIBot/Demo/AD1/config.yaml:/app/config.yaml:ro
      - ./AIBot/Demo/AD1/data:/app/data
      - ./AIBot/Demo/AD1/logs:/app/logs

  sd1:
    build:
      context: ./ScalpingBot/Demo/SD1
    container_name: cryptobot-sd1
    restart: always
    volumes:
      - ./ScalpingBot/Demo/SD1/config.yaml:/app/config.yaml:ro
      - ./ScalpingBot/Demo/SD1/data:/app/data
      - ./ScalpingBot/Demo/SD1/logs:/app/logs

  sd2:
    build:
      context: ./ScalpingBot/Demo/SD2
    container_name: cryptobot-sd2
    restart: always
    volumes:
      - ./ScalpingBot/Demo/SD2/config.yaml:/app/config.yaml:ro
      - ./ScalpingBot/Demo/SD2/data:/app/data
      - ./ScalpingBot/Demo/SD2/logs:/app/logs

  coach:
    build:
      context: ./AICoach/AC1
    container_name: cryptobot-coach
    restart: always
    volumes:
      - ./AICoach/AC1/config.yaml:/app/config.yaml:ro
      - ./AICoach/AC1/data:/app/data
      - ./AICoach/AC1/logs:/app/logs
      - ./RuleBot/Live/RL1/data:/app/bot_data/rl1:ro
      - ./RuleBot/Demo/RD1/data:/app/bot_data/rd1:ro
      - ./AIBot/Demo/AD1/data:/app/bot_data/ad1:ro
      - ./ScalpingBot/Demo/SD1/data:/app/bot_data/sd1:ro
      - ./ScalpingBot/Demo/SD2/data:/app/bot_data/sd2:ro

  dashboard:
    build:
      context: ./RuleBot/Live/RL1
    container_name: cryptobot-dashboard
    restart: always
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "30", "dashboard:app"]
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      - BOT_DATA_DIR=/app/bot_data
      - CAPITAL_EMAIL=${CAPITAL_EMAIL}
      - CAPITAL_PASSWORD=${CAPITAL_PASSWORD}
      - CAPITAL_API_KEY=${CAPITAL_API_KEY}
    volumes:
      - ./RuleBot/Live/RL1/data:/app/bot_data/rl1:ro
      - ./RuleBot/Demo/RD1/data:/app/bot_data/rd1:ro
      - ./AIBot/Demo/AD1/data:/app/bot_data/ad1:ro
      - ./ScalpingBot/Demo/SD1/data:/app/bot_data/sd1:ro
      - ./ScalpingBot/Demo/SD2/data:/app/bot_data/sd2:ro
