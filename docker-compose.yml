x-bot-common: &bot-common
  build: .
  restart: always

services:
  rl1:
    <<: *bot-common
    container_name: cryptobot-rl1
    command: ["python", "-u", "main.py", "--config", "config.yaml"]
    volumes:
      - ./config_rl1.yaml:/app/config.yaml:ro
      - ./data_rl1:/app/data
      - ./logs_rl1:/app/logs

  rd1:
    <<: *bot-common
    container_name: cryptobot-rd1
    command: ["python", "-u", "main.py", "--config", "config.yaml"]
    volumes:
      - ./config_rd1.yaml:/app/config.yaml:ro
      - ./data_rd1:/app/data
      - ./logs_rd1:/app/logs

  ad1:
    <<: *bot-common
    container_name: cryptobot-ad1
    command: ["python", "-u", "main_ai.py", "--config", "config.yaml"]
    volumes:
      - ./config_ad1.yaml:/app/config.yaml:ro
      - ./data_ad1:/app/data
      - ./logs_ad1:/app/logs

  sd1:
    <<: *bot-common
    container_name: cryptobot-sd1
    command: ["python", "-u", "main.py", "--config", "config.yaml"]
    volumes:
      - ./config_sd1.yaml:/app/config.yaml:ro
      - ./data_sd1:/app/data
      - ./logs_sd1:/app/logs

  sd2:
    <<: *bot-common
    container_name: cryptobot-sd2
    command: ["python", "-u", "main.py", "--config", "config.yaml"]
    volumes:
      - ./config_sd2.yaml:/app/config.yaml:ro
      - ./data_sd2:/app/data
      - ./logs_sd2:/app/logs

  coach:
    <<: *bot-common
    container_name: cryptobot-coach
    command: ["python", "-u", "main_coach.py", "--config", "config.yaml"]
    volumes:
      - ./config_coach.yaml:/app/config.yaml:ro
      - ./data_coach:/app/data
      - ./logs_coach:/app/logs
      - ./data_rl1:/app/bot_data/rl1:ro
      - ./data_rd1:/app/bot_data/rd1:ro
      - ./data_ad1:/app/bot_data/ad1:ro
      - ./data_sd1:/app/bot_data/sd1:ro
      - ./data_sd2:/app/bot_data/sd2:ro

  dashboard:
    <<: *bot-common
    container_name: cryptobot-dashboard
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "30", "dashboard:app"]
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - BOT_DATA_DIR=/app/bot_data
    volumes:
      - ./data_rl1:/app/bot_data/rl1:ro
      - ./data_rd1:/app/bot_data/rd1:ro
      - ./data_ad1:/app/bot_data/ad1:ro
      - ./data_sd1:/app/bot_data/sd1:ro
      - ./data_sd2:/app/bot_data/sd2:ro
