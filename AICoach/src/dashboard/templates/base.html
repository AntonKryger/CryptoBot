<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CryptoBot Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">CryptoBot</div>
        <div class="nav-links">
            <a href="/?bot={{ current_bot or '' }}" class="{% if request.path == '/' %}active{% endif %}">Oversigt</a>
            <a href="/trades?bot={{ current_bot or '' }}" class="{% if request.path == '/trades' %}active{% endif %}">Rapporter</a>
            <a href="/stats?bot={{ current_bot or '' }}" class="{% if request.path == '/stats' %}active{% endif %}">Statistik</a>
            <a href="/instruments?bot={{ current_bot or '' }}" class="{% if request.path == '/instruments' %}active{% endif %}">Coins</a>
            <a href="/calendar?bot={{ current_bot or '' }}" class="{% if request.path == '/calendar' %}active{% endif %}">Kalender</a>
            <a href="/compare" class="{% if request.path == '/compare' %}active{% endif %}">Sammenlign</a>
        </div>
        <div class="nav-bot-selector">
            {% for bot_key, bot_label in bot_labels.items() %}
            <a href="{{ request.path }}?bot={{ bot_key }}"
               class="btn-bot{% if current_bot == bot_key %} active{% endif %}">{{ bot_label }}</a>
            {% endfor %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('dashboard.static', filename='dashboard.js') }}"></script>
    <script>
        // Global: current bot from URL
        const currentBot = '{{ current_bot or '' }}';

        function apiUrl(path, extraParams) {
            let url = path;
            const params = new URLSearchParams();
            if (currentBot) params.set('bot', currentBot);
            if (extraParams) {
                for (const [k, v] of Object.entries(extraParams)) {
                    if (v) params.set(k, v);
                }
            }
            const qs = params.toString();
            return qs ? `${url}?${qs}` : url;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
