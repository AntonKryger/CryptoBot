bot:
  id: "RC1"
  name: "Rule Coach 01"
  type: "coach"

coach:
  type: "rule"
  analysis_days: 30
  schedule: "daily"
  strategy_context: |
    Du evaluerer RuleBots. Disse bots handler på tekniske signaler
    (EMA crossover, RSI, volume, ATR, range-position).
    En konservativ variant bør lave 2-5 trades/dag.
    En aggressiv variant bør lave 5-15 trades/dag.
    Sammenlign KUN RuleBots med andre RuleBots — aldrig med AI eller Scalper bots.

capital:
  email: "your-email@example.com"
  password: "your-password"
  api_key: "your-api-key"
  demo: true

telegram:
  enabled: false
  bot_token: "your-telegram-bot-token"
  chat_id: "your-chat-id"

database:
  path: "data/trades.db"
