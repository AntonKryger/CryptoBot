# CryptoBot Configuration
# Copy to config.yaml (rule/live bot) or config_ai.yaml (AI bot)

# Capital.com API
capital:
  email: "your-email@example.com"
  password: "your-password"
  api_key: "your-api-key"
  demo: true  # true = demo, false = live
  base_url: "https://demo-api-capital.backend-capital.com"
  # account_name: "CryptoBot AI"  # only for AI bot (switches account)

# AI settings (only for config_ai.yaml)
# ai:
#   anthropic_api_key: "sk-ant-..."
#   model: "claude-haiku-4-5-20251001"
#   max_tokens: 300
#   min_confidence: 6
#   rule_db_path: "data/trades.db"  # cross-bot learning

# Trading settings
trading:
  coins:
    - "BTCUSD"
    - "ETHUSD"
    - "SOLUSD"
    - "AVAXUSD"
    - "LINKUSD"
    - "LTCUSD"
  leverage: 2
  timeframe: "HOUR"          # 1-hour candles
  scan_interval: 300          # 5 min between scans

# Risk management
risk:
  stop_loss: 4.0              # fallback fixed SL %
  take_profit: 7.0            # fallback fixed TP %
  trailing_stop_trigger: 3.0
  max_open_positions: 6
  daily_loss_limit: 5.0       # kill switch: daily loss %
  total_loss_limit: 30.0      # kill switch: total loss %

  # ATR-based stop loss
  atr_sl_multiplier: 2.0
  atr_sl_min_pct: 3.0
  atr_sl_max_pct: 8.0

  # Max hold time per category (hours)
  max_hold_hours:
    major: 24
    altcoin: 8
    memecoin: 4

  # Capital allocation (% of total balance)
  allocation:
    max_total_exposure: 95
    max_memecoin: 5
    max_major: 40
    max_altcoin: 30
    min_position: 5

# Watchdog settings
watchdog:
  check_interval: 12
  breakeven_trigger_pct: 1.5
  progressive_sl_trigger_pct: 2.0
  progressive_sl_trail_pct: 1.0
  pullback_peak_trigger_pct: 1.5
  pullback_close_pct: 0.75
  trailing_trigger_pct: 2.5
  trailing_atr_mult: 1.5
  partial_profit_pct: 4.0
  partial_close_ratio: 0.5

# Signal engine
signals:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  volume_multiplier: 1.5
  atr_period: 14
  range_period: 24            # 24 x 1H = 24 hours
  buy_zone_pct: 20
  sell_zone_pct: 80
  min_range_pct: 3.0

# Telegram notifications
telegram:
  enabled: false
  bot_token: "your-telegram-bot-token"
  chat_id: "your-chat-id"

# Database
database:
  path: "data/trades.db"
